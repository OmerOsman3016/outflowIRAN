<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Animated Flow Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .panel {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 1000;
      width: 320px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 20px;
      color: #1a1a1a;
    }

    .panel p {
      margin: 6px 0;
      font-size: 13px;
      color: #444;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
      margin-bottom: 12px;
    }

    .stat-box {
      background: #f6f7fb;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #0b5ed7;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .controls button {
      border: none;
      background: #0b5ed7;
      color: white;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .controls button:hover {
      opacity: 0.92;
    }

    .slider-box {
      margin-top: 8px;
    }

    .slider-box label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #333;
    }

    .slider-box input[type="range"] {
      width: 100%;
    }

    .month-label {
      margin-top: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #222;
      text-align: center;
      background: #f1f4ff;
      padding: 8px;
      border-radius: 8px;
    }

    .legend {
      margin-top: 12px;
      font-size: 12px;
      color: #555;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    .legend div {
      margin-bottom: 5px;
    }

    .legend span {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      vertical-align: middle;
      border-radius: 50%;
    }

    .pulse-marker {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      position: relative;
      background: #ff5a1f;
      border: 2px solid white;
      box-shadow: 0 0 0 rgba(255,90,31,0.5);
      animation: pulse 1.5s infinite;
    }

    .pulse-marker.blue {
      background: #1565c0;
      box-shadow: 0 0 0 rgba(21,101,192,0.5);
    }

    .pulse-marker.green {
      background: #10b981;
      box-shadow: 0 0 0 rgba(16,185,129,0.5);
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(255,90,31,0.65);
      }
      70% {
        transform: scale(1.18);
        box-shadow: 0 0 0 16px rgba(255,90,31,0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(255,90,31,0);
      }
    }

    .flow-line {
      stroke-dasharray: 10 10;
      animation: dashMove 1s linear infinite;
    }

    @keyframes dashMove {
      to {
        stroke-dashoffset: -20;
      }
    }

    .moving-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #111;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>

  <div class="panel">
    <h2>Advanced Animated Flow Map</h2>
    <p>Leaflet demo with multiple animation styles for displacement, mobility, logistics, or delivery tracking.</p>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="totalFlow">0</div>
        <div class="stat-label">Total Volume</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="routeCount">0</div>
        <div class="stat-label">Active Routes</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="originCount">0</div>
        <div class="stat-label">Origins</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="destCount">0</div>
        <div class="stat-label">Destinations</div>
      </div>
    </div>

    <div class="controls">
      <button onclick="playAnimation()">Play</button>
      <button onclick="pauseAnimation()">Pause</button>
      <button onclick="nextMonth()">Next Month</button>
      <button onclick="resetMap()">Reset</button>
    </div>

    <div class="slider-box">
      <label for="monthSlider">Time Slider</label>
      <input type="range" id="monthSlider" min="0" max="3" value="0" step="1" />
      <div class="month-label" id="monthLabel">Jan 2026</div>
    </div>

    <div class="legend">
      <div><span style="background:#1565c0;"></span> Origin</div>
      <div><span style="background:#ff5a1f;"></span> Destination</div>
      <div><span style="background:#10b981;"></span> Moving marker / active route</div>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-polylinedecorator"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <script>
    const map = L.map('map', { zoomControl: true }).setView([16.5, 32.5], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const months = ["Jan 2026", "Feb 2026", "Mar 2026", "Apr 2026"];

    // Example monthly flow data
    const monthlyFlows = [
      [
        { from: "Khartoum", fromCoords: [15.5007, 32.5599], to: "Port Sudan", toCoords: [19.6158, 37.2164], volume: 2200 },
        { from: "Khartoum", fromCoords: [15.5007, 32.5599], to: "Kassala", toCoords: [15.4581, 36.4032], volume: 1200 },
        { from: "El Fasher", fromCoords: [13.6279, 25.3494], to: "Dongola", toCoords: [19.1816, 30.4749], volume: 900 }
      ],
      [
        { from: "Khartoum", fromCoords: [15.5007, 32.5599], to: "Port Sudan", toCoords: [19.6158, 37.2164], volume: 2600 },
        { from: "Nyala", fromCoords: [12.0500, 24.8833], to: "El Obeid", toCoords: [13.1842, 30.2167], volume: 1400 },
        { from: "Kassala", fromCoords: [15.4581, 36.4032], to: "Gedaref", toCoords: [14.0349, 35.3834], volume: 1100 }
      ],
      [
        { from: "El Geneina", fromCoords: [13.4526, 22.4472], to: "El Fasher", toCoords: [13.6279, 25.3494], volume: 1700 },
        { from: "Khartoum", fromCoords: [15.5007, 32.5599], to: "Wad Madani", toCoords: [14.4012, 33.5199], volume: 1350 },
        { from: "Port Sudan", fromCoords: [19.6158, 37.2164], to: "Atbara", toCoords: [17.7022, 33.9864], volume: 1000 }
      ],
      [
        { from: "Dongola", fromCoords: [19.1816, 30.4749], to: "Khartoum", toCoords: [15.5007, 32.5599], volume: 1500 },
        { from: "Gedaref", fromCoords: [14.0349, 35.3834], to: "Kassala", toCoords: [15.4581, 36.4032], volume: 950 },
        { from: "El Obeid", fromCoords: [13.1842, 30.2167], to: "Khartoum", toCoords: [15.5007, 32.5599], volume: 1800 }
      ]
    ];

    let currentMonthIndex = 0;
    let playTimer = null;

    let pointMarkers = [];
    let routeLines = [];
    let routeArrows = [];
    let heatLayer = null;
    let movingMarker = null;
    let activeRoutePoints = [];
    let moveIndex = 0;
    let moveTimer = null;

    const monthSlider = document.getElementById("monthSlider");
    const monthLabel = document.getElementById("monthLabel");

    function createPulseIcon(type = "orange") {
      return L.divIcon({
        className: "",
        html: `<div class="pulse-marker ${type}"></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });
    }

    function createMovingIcon() {
      return L.divIcon({
        className: "",
        html: `<div class="moving-dot"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });
    }

    function interpolatePoints(start, end, count = 60) {
      const points = [];
      for (let i = 0; i <= count; i++) {
        const t = i / count;
        const lat = start[0] + (end[0] - start[0]) * t;
        const lng = start[1] + (end[1] - start[1]) * t;
        points.push([lat, lng]);
      }
      return points;
    }

    function clearLayers() {
      pointMarkers.forEach(m => map.removeLayer(m));
      routeLines.forEach(l => map.removeLayer(l));
      routeArrows.forEach(a => map.removeLayer(a));

      pointMarkers = [];
      routeLines = [];
      routeArrows = [];

      if (heatLayer) {
        map.removeLayer(heatLayer);
        heatLayer = null;
      }

      if (movingMarker) {
        map.removeLayer(movingMarker);
        movingMarker = null;
      }

      clearInterval(moveTimer);
    }

    function updateStats(data) {
      const totalFlow = data.reduce((sum, d) => sum + d.volume, 0);
      const origins = new Set(data.map(d => d.from)).size;
      const destinations = new Set(data.map(d => d.to)).size;

      document.getElementById("totalFlow").textContent = totalFlow.toLocaleString();
      document.getElementById("routeCount").textContent = data.length;
      document.getElementById("originCount").textContent = origins;
      document.getElementById("destCount").textContent = destinations;
    }

    function drawMonth(index) {
      clearLayers();

      const data = monthlyFlows[index];
      monthLabel.textContent = months[index];
      monthSlider.value = index;
      updateStats(data);

      const heatData = [];

      data.forEach((flow, i) => {
        const weight = Math.max(3, flow.volume / 500);

        // Line
        const line = L.polyline([flow.fromCoords, flow.toCoords], {
          color: i % 3 === 0 ? "#1565c0" : (i % 3 === 1 ? "#ff5a1f" : "#10b981"),
          weight: Math.min(12, Math.max(3, flow.volume / 300)),
          opacity: 0.85,
          className: "flow-line"
        }).addTo(map);

        line.bindTooltip(
          `<b>${flow.from} → ${flow.to}</b><br>Volume: ${flow.volume.toLocaleString()}`
        );

        routeLines.push(line);

        // Arrow decorator
        const arrows = L.polylineDecorator(line, {
          patterns: [
            {
              offset: 25,
              repeat: 50,
              symbol: L.Symbol.arrowHead({
                pixelSize: 10,
                polygon: false,
                pathOptions: {
                  stroke: true,
                  color: "#222",
                  weight: 2
                }
              })
            }
          ]
        }).addTo(map);

        routeArrows.push(arrows);

        // Origin marker
        const originMarker = L.marker(flow.fromCoords, {
          icon: createPulseIcon("blue")
        }).addTo(map).bindPopup(`<b>Origin:</b> ${flow.from}`);

        // Destination marker
        const destMarker = L.marker(flow.toCoords, {
          icon: createPulseIcon("")
        }).addTo(map).bindPopup(`<b>Destination:</b> ${flow.to}`);

        pointMarkers.push(originMarker, destMarker);

        // Heatmap points
        heatData.push([flow.fromCoords[0], flow.fromCoords[1], flow.volume / 3000]);
        heatData.push([flow.toCoords[0], flow.toCoords[1], flow.volume / 3000]);
      });

      heatLayer = L.heatLayer(heatData, {
        radius: 35,
        blur: 22,
        maxZoom: 10
      }).addTo(map);

      // Move camera to first route
      if (data.length > 0) {
        const first = data[0];
        const bounds = L.latLngBounds([first.fromCoords, first.toCoords]);
        map.flyToBounds(bounds, {
          padding: [80, 80],
          duration: 2
        });

        startMovingMarker(first.fromCoords, first.toCoords, first);
      }
    }

    function startMovingMarker(start, end, flow) {
      activeRoutePoints = interpolatePoints(start, end, 80);
      moveIndex = 0;

      if (movingMarker) {
        map.removeLayer(movingMarker);
      }

      movingMarker = L.marker(activeRoutePoints[0], {
        icon: createPulseIcon("green")
      }).addTo(map);

      movingMarker.bindTooltip(
        `<b>Moving:</b> ${flow.from} → ${flow.to}<br>Volume: ${flow.volume.toLocaleString()}`,
        { permanent: false, direction: "top" }
      );

      clearInterval(moveTimer);

      moveTimer = setInterval(() => {
        if (!movingMarker) return;

        movingMarker.setLatLng(activeRoutePoints[moveIndex]);
        moveIndex++;

        if (moveIndex >= activeRoutePoints.length) {
          moveIndex = 0;
        }
      }, 90);
    }

    function playAnimation() {
      clearInterval(playTimer);

      playTimer = setInterval(() => {
        currentMonthIndex++;
        if (currentMonthIndex >= months.length) currentMonthIndex = 0;
        drawMonth(currentMonthIndex);
      }, 4500);
    }

    function pauseAnimation() {
      clearInterval(playTimer);
      clearInterval(moveTimer);
    }

    function nextMonth() {
      currentMonthIndex++;
      if (currentMonthIndex >= months.length) currentMonthIndex = 0;
      drawMonth(currentMonthIndex);
    }

    function resetMap() {
      pauseAnimation();
      currentMonthIndex = 0;
      drawMonth(currentMonthIndex);
      map.flyTo([16.5, 32.5], 6, { duration: 2 });
    }

    monthSlider.addEventListener("input", function() {
      currentMonthIndex = parseInt(this.value, 10);
      drawMonth(currentMonthIndex);
    });

    // Initial draw
    drawMonth(currentMonthIndex);
  </script>
</body>
</html>
