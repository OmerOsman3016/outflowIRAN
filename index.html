<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Flow Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .info-box {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 12px 14px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      max-width: 280px;
    }

    .info-box h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .info-box p {
      margin: 4px 0;
      font-size: 14px;
      line-height: 1.4;
    }

    .controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .controls button {
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      background: #0b5ed7;
      color: white;
      font-size: 14px;
    }

    .controls button:hover {
      opacity: 0.9;
    }

    /* Pulsing marker */
    .pulse-icon {
      width: 20px;
      height: 20px;
      background: #ff5722;
      border: 3px solid white;
      border-radius: 50%;
      box-shadow: 0 0 0 rgba(255, 87, 34, 0.6);
      animation: pulse 1.6s infinite;
    }

    .pulse-blue {
      background: #1565c0;
      box-shadow: 0 0 0 rgba(21, 101, 192, 0.6);
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(255, 87, 34, 0.7);
      }
      70% {
        transform: scale(1.15);
        box-shadow: 0 0 0 18px rgba(255, 87, 34, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(255, 87, 34, 0);
      }
    }

    /* Animated dashed line */
    .flow-line {
      stroke-dasharray: 12 10;
      animation: dashMove 1.2s linear infinite;
    }

    @keyframes dashMove {
      to {
        stroke-dashoffset: -22;
      }
    }
  </style>
</head>
<body>

  <div class="info-box">
    <h3>Animated Flow Map</h3>
    <p>This demo shows animated movement between locations using Leaflet.</p>
    <p><strong>Use:</strong> migration flows, delivery routes, transport, displacement tracking.</p>

    <div class="controls">
      <button onclick="startTour()">Start Tour</button>
      <button onclick="resetMap()">Reset</button>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // 1. Create map
    const map = L.map('map', {
      zoomControl: true
    }).setView([15.5007, 32.5599], 6); // Sudan center-ish

    // 2. Base map
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 3. Example locations
    const locations = [
      {
        name: "Khartoum",
        coords: [15.5007, 32.5599],
        colorClass: "pulse-blue"
      },
      {
        name: "Port Sudan",
        coords: [19.6158, 37.2164],
        colorClass: ""
      },
      {
        name: "El Fasher",
        coords: [13.6279, 25.3494],
        colorClass: ""
      },
      {
        name: "Kassala",
        coords: [15.4581, 36.4032],
        colorClass: ""
      }
    ];

    // 4. Custom pulsing div icon
    function createPulseIcon(extraClass = "") {
      return L.divIcon({
        className: "",
        html: `<div class="pulse-icon ${extraClass}"></div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });
    }

    // 5. Add markers
    const markers = [];
    locations.forEach(loc => {
      const marker = L.marker(loc.coords, {
        icon: createPulseIcon(loc.colorClass)
      }).addTo(map).bindPopup(`<b>${loc.name}</b>`);
      markers.push(marker);
    });

    // 6. Define flows between locations
    const flows = [
      [locations[0], locations[1]],
      [locations[0], locations[2]],
      [locations[1], locations[3]]
    ];

    const lineLayers = [];

    function drawFlows() {
      clearFlows();

      flows.forEach((flow, index) => {
        const from = flow[0].coords;
        const to = flow[1].coords;

        const polyline = L.polyline([from, to], {
          color: index % 2 === 0 ? "#ff5722" : "#1565c0",
          weight: 4,
          opacity: 0.9,
          className: "flow-line"
        }).addTo(map);

        polyline.bindTooltip(`${flow[0].name} → ${flow[1].name}`);
        lineLayers.push(polyline);
      });
    }

    function clearFlows() {
      lineLayers.forEach(line => map.removeLayer(line));
      lineLayers.length = 0;
    }

    // 7. Tour animation
    let currentStep = 0;
    let tourTimer = null;

    function focusLocation(index) {
      const loc = locations[index];
      map.flyTo(loc.coords, 8, {
        duration: 2.5
      });

      setTimeout(() => {
        markers[index].openPopup();
      }, 1200);
    }

    function startTour() {
      clearInterval(tourTimer);
      drawFlows();

      currentStep = 0;
      focusLocation(currentStep);

      tourTimer = setInterval(() => {
        currentStep++;
        if (currentStep >= locations.length) {
          currentStep = 0;
        }
        focusLocation(currentStep);
      }, 4000);
    }

    function resetMap() {
      clearInterval(tourTimer);
      clearFlows();
      map.flyTo([15.5007, 32.5599], 6, { duration: 2 });
      markers.forEach(m => m.closePopup());
    }

    // 8. Start with lines visible
    drawFlows();
  </script>
</body>
</html>
