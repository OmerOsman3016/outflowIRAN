<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudan Cross-Border Animated Flow Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .panel {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 1000;
      width: 360px;
      background: rgba(255,255,255,0.96);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 20px;
      color: #1a1a1a;
    }

    .panel p {
      margin: 6px 0;
      font-size: 13px;
      color: #444;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
      margin-bottom: 12px;
    }

    .stat-box {
      background: #f6f7fb;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #0b5ed7;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .controls button {
      border: none;
      background: #0b5ed7;
      color: white;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .controls button:hover {
      opacity: 0.92;
    }

    .slider-box {
      margin-top: 8px;
    }

    .slider-box label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #333;
    }

    .slider-box input[type="range"] {
      width: 100%;
    }

    .month-label {
      margin-top: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #222;
      text-align: center;
      background: #f1f4ff;
      padding: 8px;
      border-radius: 8px;
    }

    .legend {
      margin-top: 12px;
      font-size: 12px;
      color: #555;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    .legend div {
      margin-bottom: 5px;
    }

    .legend span {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      vertical-align: middle;
      border-radius: 50%;
    }

    .pulse-marker {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      position: relative;
      background: #ff5a1f;
      border: 2px solid white;
      box-shadow: 0 0 0 rgba(255,90,31,0.5);
      animation: pulse 1.5s infinite;
    }

    .pulse-marker.blue {
      background: #1565c0;
    }

    .pulse-marker.green {
      background: #10b981;
    }

    .border-point-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #111827;
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .bp-label {
      background: rgba(255,255,255,0.95);
      border: 1px solid #d9dce3;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: bold;
      color: #222;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .flow-line {
      stroke-dasharray: 10 10;
      animation: dashMove 1s linear infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(255,90,31,0.65);
      }
      70% {
        transform: scale(1.18);
        box-shadow: 0 0 0 16px rgba(255,90,31,0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(255,90,31,0);
      }
    }

    @keyframes dashMove {
      to {
        stroke-dashoffset: -20;
      }
    }
  </style>
</head>
<body>

  <div class="panel">
    <h2>Cross-Border Flow Map</h2>
    <p>Animated Leaflet map using your real border points and neighbouring countries.</p>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="totalFlow">0</div>
        <div class="stat-label">Total Volume</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="routeCount">0</div>
        <div class="stat-label">Active Routes</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="originCount">0</div>
        <div class="stat-label">Origins</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="countryCount">0</div>
        <div class="stat-label">Countries</div>
      </div>
    </div>

    <div class="controls">
      <button onclick="playAnimation()">Play</button>
      <button onclick="pauseAnimation()">Pause</button>
      <button onclick="nextMonth()">Next Month</button>
      <button onclick="resetMap()">Reset</button>
      <button onclick="toggleBorderPoints()">Toggle Border Points</button>
    </div>

    <div class="slider-box">
      <label for="monthSlider">Time Slider</label>
      <input type="range" id="monthSlider" min="0" max="3" value="0" step="1" />
      <div class="month-label" id="monthLabel">Jan 2026</div>
    </div>

    <div class="legend">
      <div><span style="background:#111827;"></span> Border Point</div>
      <div><span style="background:#1565c0;"></span> Origin</div>
      <div><span style="background:#ff5a1f;"></span> Destination</div>
      <div><span style="background:#10b981;"></span> Moving Marker</div>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-polylinedecorator"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <script>
    // =========================
    // MAP
    // =========================
    const map = L.map('map', { zoomControl: true }).setView([15.7, 30.8], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const months = ["Jan 2026", "Feb 2026", "Mar 2026", "Apr 2026"];

    // =========================
    // YOUR REAL BORDER POINTS
    // Y = latitude, X = longitude
    // =========================
    const borderPoints = [
      { name: "Um Dukhun", country: "Chad", lat: 11.139, lng: 22.966 },
      { name: "Gallabat/Metema", country: "Ethiopia", lat: 12.95798, lng: 36.151888 },
      { name: "Argeen", country: "Egypt", lat: 21.988934, lng: 31.153322 },
      { name: "Ashkeet", country: "Egypt", lat: 22.000523, lng: 31.511477 },
      { name: "Adekonk", country: "Chad", lat: 13.4623111, lng: 22.2296523 },
      { name: "Tina", country: "Chad", lat: 15.011970, lng: 22.489920 },
      { name: "Juda", country: "South Sudan", lat: 12.236580, lng: 32.761862 },
      { name: "Al Laffa", country: "Eretria", lat: 15.15372, lng: 36.4355 }
    ];

    const borderPointLookup = {};
    borderPoints.forEach(bp => {
      borderPointLookup[bp.name] = bp;
    });

    // =========================
    // SAMPLE MONTHLY FLOW DATA USING YOUR BORDER POINTS
    // =========================
    const monthlyFlows = [
      [
        { from: "Argeen", to: "Dongola", toCoords: [19.1816, 30.4749], volume: 27867 },
        { from: "Ashkeet", to: "Wadi Halfa", toCoords: [21.8011, 31.3499], volume: 8530 },
        { from: "Um Dukhun", to: "El Geneina", toCoords: [13.4526, 22.4472], volume: 9731 },
        { from: "Gallabat/Metema", to: "Gedaref", toCoords: [14.0349, 35.3834], volume: 6200 }
      ],
      [
        { from: "Um Dukhun", to: "El Geneina", toCoords: [13.4526, 22.4472], volume: 10178 },
        { from: "Argeen", to: "Dongola", toCoords: [19.1816, 30.4749], volume: 29488 },
        { from: "Ashkeet", to: "Wadi Halfa", toCoords: [21.8011, 31.3499], volume: 1222 },
        { from: "Juda", to: "Kosti", toCoords: [13.1629, 32.6635], volume: 7100 }
      ],
      [
        { from: "Tina", to: "El Fasher", toCoords: [13.6279, 25.3494], volume: 9600 },
        { from: "Adekonk", to: "El Geneina", toCoords: [13.4526, 22.4472], volume: 7800 },
        { from: "Al Laffa", to: "Kassala", toCoords: [15.4581, 36.4032], volume: 5400 },
        { from: "Gallabat/Metema", to: "Gedaref", toCoords: [14.0349, 35.3834], volume: 6800 }
      ],
      [
        { from: "Argeen", to: "Khartoum", toCoords: [15.5007, 32.5599], volume: 13200 },
        { from: "Ashkeet", to: "Atbara", toCoords: [17.7022, 33.9864], volume: 4100 },
        { from: "Juda", to: "Rabak", toCoords: [13.1809, 32.7391], volume: 5900 },
        { from: "Al Laffa", to: "Kassala", toCoords: [15.4581, 36.4032], volume: 6200 }
      ]
    ];

    let currentMonthIndex = 0;
    let playTimer = null;
    let moveTimer = null;

    let pointMarkers = [];
    let routeLines = [];
    let routeArrows = [];
    let heatLayer = null;
    let movingMarker = null;

    let borderPointLayerGroup = L.layerGroup().addTo(map);

    const monthSlider = document.getElementById("monthSlider");
    const monthLabel = document.getElementById("monthLabel");

    // =========================
    // ICONS
    // =========================
    function createPulseIcon(type = "") {
      return L.divIcon({
        className: "",
        html: `<div class="pulse-marker ${type}"></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });
    }

    function createBorderPointIcon() {
      return L.divIcon({
        className: "",
        html: `<div class="border-point-icon"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });
    }

    // =========================
    // BORDER POINTS
    // =========================
    function drawBorderPoints() {
      borderPointLayerGroup.clearLayers();

      borderPoints.forEach(bp => {
        const marker = L.marker([bp.lat, bp.lng], {
          icon: createBorderPointIcon()
        });

        marker.bindPopup(`
          <b>Cross Border Name:</b> ${bp.name}<br>
          <b>Neighbouring Country:</b> ${bp.country}<br>
          <b>Y:</b> ${bp.lat}<br>
          <b>X:</b> ${bp.lng}
        `);

        marker.bindTooltip(`${bp.name} (${bp.country})`, {
          permanent: false,
          direction: "top"
        });

        borderPointLayerGroup.addLayer(marker);

        const label = L.marker([bp.lat, bp.lng], {
          interactive: false,
          icon: L.divIcon({
            className: "",
            html: `<div class="bp-label">${bp.name}</div>`,
            iconSize: [90, 20],
            iconAnchor: [-8, 10]
          })
        });

        borderPointLayerGroup.addLayer(label);
      });
    }

    function toggleBorderPoints() {
      if (map.hasLayer(borderPointLayerGroup)) {
        map.removeLayer(borderPointLayerGroup);
      } else {
        map.addLayer(borderPointLayerGroup);
      }
    }

    // =========================
    // HELPERS
    // =========================
    function interpolatePoints(start, end, count = 80) {
      const points = [];
      for (let i = 0; i <= count; i++) {
        const t = i / count;
        const lat = start[0] + (end[0] - start[0]) * t;
        const lng = start[1] + (end[1] - start[1]) * t;
        points.push([lat, lng]);
      }
      return points;
    }

    function clearFlowLayers() {
      pointMarkers.forEach(m => map.removeLayer(m));
      routeLines.forEach(l => map.removeLayer(l));
      routeArrows.forEach(a => map.removeLayer(a));

      pointMarkers = [];
      routeLines = [];
      routeArrows = [];

      if (heatLayer) {
        map.removeLayer(heatLayer);
        heatLayer = null;
      }

      if (movingMarker) {
        map.removeLayer(movingMarker);
        movingMarker = null;
      }

      clearInterval(moveTimer);
    }

    function updateStats(data) {
      const totalFlow = data.reduce((sum, d) => sum + d.volume, 0);
      const origins = new Set(data.map(d => d.from)).size;
      const countries = new Set(
        data.map(d => borderPointLookup[d.from]?.country).filter(Boolean)
      ).size;

      document.getElementById("totalFlow").textContent = totalFlow.toLocaleString();
      document.getElementById("routeCount").textContent = data.length;
      document.getElementById("originCount").textContent = origins;
      document.getElementById("countryCount").textContent = countries;
    }

    // =========================
    // DRAW MONTH
    // =========================
    function drawMonth(index) {
      clearFlowLayers();

      const data = monthlyFlows[index];
      monthLabel.textContent = months[index];
      monthSlider.value = index;
      updateStats(data);

      const heatData = [];

      data.forEach((flow, i) => {
        const bp = borderPointLookup[flow.from];
        if (!bp) return;

        const fromCoords = [bp.lat, bp.lng];
        const toCoords = flow.toCoords;

        const color =
          i % 4 === 0 ? "#1565c0" :
          i % 4 === 1 ? "#ff5a1f" :
          i % 4 === 2 ? "#10b981" :
          "#7c3aed";

        const line = L.polyline([fromCoords, toCoords], {
          color: color,
          weight: Math.min(14, Math.max(3, flow.volume / 2500)),
          opacity: 0.9,
          className: "flow-line"
        }).addTo(map);

        line.bindTooltip(`
          <b>${flow.from} → ${flow.to}</b><br>
          Country: ${bp.country}<br>
          Volume: ${flow.volume.toLocaleString()}
        `);

        routeLines.push(line);

        const arrows = L.polylineDecorator(line, {
          patterns: [
            {
              offset: 25,
              repeat: 50,
              symbol: L.Symbol.arrowHead({
                pixelSize: 10,
                polygon: false,
                pathOptions: {
                  stroke: true,
                  color: "#222",
                  weight: 2
                }
              })
            }
          ]
        }).addTo(map);

        routeArrows.push(arrows);

        const originMarker = L.marker(fromCoords, {
          icon: createPulseIcon("blue")
        }).addTo(map).bindPopup(`
          <b>Origin Border Point:</b> ${flow.from}<br>
          <b>Neighbouring Country:</b> ${bp.country}
        `);

        const destMarker = L.marker(toCoords, {
          icon: createPulseIcon("")
        }).addTo(map).bindPopup(`
          <b>Destination:</b> ${flow.to}<br>
          <b>Volume:</b> ${flow.volume.toLocaleString()}
        `);

        pointMarkers.push(originMarker, destMarker);

        heatData.push([fromCoords[0], fromCoords[1], flow.volume / 30000]);
        heatData.push([toCoords[0], toCoords[1], flow.volume / 30000]);
      });

      heatLayer = L.heatLayer(heatData, {
        radius: 35,
        blur: 22,
        maxZoom: 10
      }).addTo(map);

      if (data.length > 0) {
        const firstFlow = data[0];
        const firstBP = borderPointLookup[firstFlow.from];
        const start = [firstBP.lat, firstBP.lng];
        const end = firstFlow.toCoords;

        map.flyToBounds(L.latLngBounds([start, end]), {
          padding: [60, 60],
          duration: 2
        });

        startMovingMarker(start, end, firstFlow, firstBP.country);
      }
    }

    // =========================
    // MOVING MARKER
    // =========================
    function startMovingMarker(start, end, flow, country) {
      const routePoints = interpolatePoints(start, end, 80);
      let moveIndex = 0;

      if (movingMarker) {
        map.removeLayer(movingMarker);
      }

      movingMarker = L.marker(routePoints[0], {
        icon: createPulseIcon("green")
      }).addTo(map);

      movingMarker.bindTooltip(`
        <b>Moving:</b> ${flow.from} → ${flow.to}<br>
        <b>Country:</b> ${country}<br>
        <b>Volume:</b> ${flow.volume.toLocaleString()}
      `);

      clearInterval(moveTimer);

      moveTimer = setInterval(() => {
        if (!movingMarker) return;
        movingMarker.setLatLng(routePoints[moveIndex]);
        moveIndex++;
        if (moveIndex >= routePoints.length) {
          moveIndex = 0;
        }
      }, 90);
    }

    // =========================
    // CONTROLS
    // =========================
    function playAnimation() {
      clearInterval(playTimer);
      playTimer = setInterval(() => {
        currentMonthIndex++;
        if (currentMonthIndex >= months.length) currentMonthIndex = 0;
        drawMonth(currentMonthIndex);
      }, 4500);
    }

    function pauseAnimation() {
      clearInterval(playTimer);
      clearInterval(moveTimer);
    }

    function nextMonth() {
      currentMonthIndex++;
      if (currentMonthIndex >= months.length) currentMonthIndex = 0;
      drawMonth(currentMonthIndex);
    }

    function resetMap() {
      pauseAnimation();
      currentMonthIndex = 0;
      drawMonth(currentMonthIndex);
      map.flyTo([15.7, 30.8], 6, { duration: 2 });
    }

    monthSlider.addEventListener("input", function () {
      currentMonthIndex = parseInt(this.value, 10);
      drawMonth(currentMonthIndex);
    });

    // =========================
    // INITIAL LOAD
    // =========================
    drawBorderPoints();
    drawMonth(currentMonthIndex);
  </script>
</body>
</html>
